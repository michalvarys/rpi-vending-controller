services:
  trafika-hub:
    image: ghcr.io/michalvarys/trafika-hub:latest
    container_name: trafika-hub
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      POLL_INTERVAL: ${POLL_INTERVAL:-3}
      POLL_TIMEOUT: ${POLL_TIMEOUT:-4}
      QR_ROTATE_SECONDS: ${QR_ROTATE_SECONDS:-60}
      HUB_ADMIN_USER: ${HUB_ADMIN_USER:-admin}
      HUB_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:-}
      HUB_API_TOKEN: ${HUB_API_TOKEN:-}
    volumes:
      - ./rpis.yml:/config/rpis.yml:ro
