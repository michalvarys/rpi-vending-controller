services:
  trafika-shop-mock:
    image: ghcr.io/michalvarys/trafika-shop-mock:latest
    container_name: trafika-shop-mock
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: ${PORT:-8081}
      HUB_URL: ${HUB_URL:-http://127.0.0.1:8080}
      RPI_HOSTNAME: ${RPI_HOSTNAME:?RPI_HOSTNAME is required — set it in .env}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required — set it in .env}
      HEARTBEAT_TIMEOUT_SECONDS: ${HEARTBEAT_TIMEOUT_SECONDS:-30}
      SESSION_DURATION_SECONDS: ${SESSION_DURATION_SECONDS:-180}
      EXTEND_SECONDS: ${EXTEND_SECONDS:-180}
      MAX_SESSION_SECONDS: ${MAX_SESSION_SECONDS:-900}
